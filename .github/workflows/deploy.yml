name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci

      # Build every configurator; each is served from its own subpath
      # (vite `base` = /nxGenerator/<app>/).
      - run: npx nx run-many -t build -p @nxgen/stairgen @nxgen/taras @nxgen/planter

      # Assemble the published site: a landing page + one folder per app.
      - name: Assemble site
        run: |
          mkdir -p public
          cp .github/pages/index.html public/index.html
          cp -r apps/stairgen/dist public/stairgen
          cp -r apps/taras/dist    public/taras
          cp -r apps/planter/dist  public/planter

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
