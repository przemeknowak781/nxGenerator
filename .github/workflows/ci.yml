name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      # Derive base/head SHAs so `nx affected` only runs projects touched
      # by this change (and everything that depends on them).
      - uses: nrwl/nx-set-shas@v4

      - run: npx nx sync:check
      - run: npx nx affected -t lint test build typecheck --parallel=3
